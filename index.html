<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리가족 오늘 메뉴 추천 🍽️</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2E7D32;--green-light:#E8F5E9;--green-mid:#4CAF50;
  --orange:#E65100;--orange-light:#FFF3E0;--orange-mid:#FF9800;
  --teal:#00695C;--teal-light:#E0F2F1;
  --red:#C62828;--red-light:#FFEBEE;
  --purple:#6A1B9A;--purple-light:#F3E5F5;
  --gray:#424242;--gray-light:#F5F5F5;--gray-border:#E0E0E0;
  --white:#FFFFFF;
}
body{font-family:'Noto Sans KR',sans-serif;background:#FAFAFA;color:#212121;min-height:100vh}
.site-header{background:#fff;border-bottom:1px solid var(--gray-border);padding:0 16px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px}
.site-title{display:flex;align-items:center;gap:8px}
.site-title h1{font-size:16px;font-weight:700;color:var(--green)}
.weather-pill{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--teal-light);border-radius:20px;font-size:12px;color:var(--teal);font-weight:500}
.weather-pill i{font-size:13px}
.tabs{background:#fff;border-bottom:1px solid var(--gray-border)}
.tabs-inner{max-width:800px;margin:0 auto;display:flex}
.tab-btn{flex:1;padding:12px 4px;border:none;background:none;font-family:inherit;font-size:13px;color:#9E9E9E;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .2s;font-weight:400}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);font-weight:700}
.tab-btn i{display:block;font-size:18px;margin:0 auto 3px}
.content{max-width:800px;margin:0 auto;padding:16px 14px 60px}
.tab-panel{display:none}.tab-panel.active{display:block}
.card{background:#fff;border:1px solid var(--gray-border);border-radius:14px;padding:16px;margin-bottom:14px}
.card-title{font-size:13px;font-weight:600;color:#616161;margin-bottom:12px;display:flex;align-items:center;gap:5px}
.card-title i{font-size:15px;color:var(--green-mid)}

/* 기분 */
.mood-grid{display:flex;flex-wrap:wrap;gap:7px}
.mood-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--gray-border);background:#fff;font-size:13px;cursor:pointer;color:var(--gray);transition:all .15s;font-family:inherit}
.mood-btn.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

/* 추천 버튼 */
.rec-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit}
.rec-btn.green{background:var(--green);color:#fff}.rec-btn.green:hover{background:#1B5E20}
.rec-btn.orange{background:var(--orange);color:#fff}.rec-btn.orange:hover{background:#BF360C}
.rec-btn:disabled{opacity:.45;cursor:not-allowed}

/* 결과 */
.result-wrapper{animation:slideUp .35s ease;margin-top:16px}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.main-result{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border:1.5px solid var(--green-mid);border-radius:16px;padding:20px;margin-bottom:12px}
.result-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--green-mid);color:#fff;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}
.result-menu-name{font-size:26px;font-weight:700;color:var(--green);margin-bottom:8px}
.result-reason{font-size:14px;color:#37474F;line-height:1.7;margin-bottom:12px}
.recipe-tip{background:#fff;border-radius:10px;padding:11px 13px;font-size:13px;color:#546E7A;line-height:1.6;border-left:3px solid var(--green-mid)}
.recipe-tip strong{color:var(--green);display:block;margin-bottom:3px;font-size:12px}
.missing-ing{font-size:12px;color:var(--orange);margin-top:8px}
.yt-section{margin-top:12px}
.yt-label{font-size:12px;font-weight:600;color:#757575;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.yt-label i{color:#FF0000;font-size:14px}
.yt-link-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--gray-border);border-radius:10px;text-decoration:none;color:inherit;background:#fff;margin-bottom:6px;cursor:pointer;transition:border .15s}
.yt-link-btn:hover{border-color:#FF0000}
.yt-icon{width:34px;height:24px;background:#FF0000;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.yt-icon i{color:#fff;font-size:15px}
.yt-text{flex:1;min-width:0}
.yt-title-text{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yt-sub{font-size:11px;color:#9E9E9E;margin-top:1px}
.alts-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.alt-card{background:#fff;border:1px solid var(--gray-border);border-radius:12px;padding:12px;transition:all .15s}
.alt-card:hover{border-color:var(--orange-mid);background:var(--orange-light)}
.alt-name{font-size:14px;font-weight:600;margin-bottom:3px}
.alt-reason{font-size:12px;color:#757575;line-height:1.5}
.trend-card{background:var(--orange-light);border:1px solid #FFCC80;border-radius:12px;padding:14px;margin-top:4px}
.trend-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--orange-mid);color:#fff;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:7px}
.trend-name{font-size:15px;font-weight:700;color:var(--orange);margin-bottom:5px}
.trend-reason{font-size:13px;color:#5D4037;line-height:1.6;margin-bottom:8px}

/* 냉장고 탭 */
.ing-category{margin-bottom:16px}
.ing-cat-label{font-size:12px;font-weight:700;color:#9E9E9E;margin-bottom:8px;display:flex;align-items:center;gap:4px;letter-spacing:.4px;text-transform:uppercase}
.ing-chips{display:flex;flex-wrap:wrap;gap:6px}
.ing-chip{padding:6px 12px;border-radius:20px;border:1.5px solid var(--gray-border);background:#fff;font-size:12px;cursor:pointer;color:#616161;transition:all .15s;font-family:inherit;user-select:none}
.ing-chip.cat-단백질.selected{background:#FFEBEE;border-color:#EF9A9A;color:#C62828;font-weight:600}
.ing-chip.cat-채소.selected{background:#E8F5E9;border-color:#A5D6A7;color:#2E7D32;font-weight:600}
.ing-chip.cat-기본재료.selected{background:#FFF9C4;border-color:#FFF176;color:#F57F17;font-weight:600}
.ing-chip.cat-양념.selected{background:#F3E5F5;border-color:#CE93D8;color:#6A1B9A;font-weight:600}
.ing-chip.cat-면밥.selected{background:#FBE9E7;border-color:#FFAB91;color:#BF360C;font-weight:600}
.ing-chip.cat-유제품.selected{background:#E3F2FD;border-color:#90CAF9;color:#1565C0;font-weight:600}
.custom-ing-row{display:flex;gap:8px;margin-top:10px}
.custom-ing-row input{flex:1;padding:9px 13px;border:1.5px solid var(--gray-border);border-radius:10px;font-size:13px;font-family:inherit;outline:none}
.custom-ing-row input:focus{border-color:var(--green-mid)}
.add-btn{padding:9px 14px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;white-space:nowrap}
.selected-ings-bar{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;padding:4px 0}
.ing-tag{display:flex;align-items:center;gap:3px;padding:4px 10px;background:var(--green-light);border-radius:20px;font-size:12px;color:var(--green);font-weight:600}
.ing-tag button{border:none;background:none;cursor:pointer;color:var(--green);font-size:13px;line-height:1;padding:0;display:flex}
.no-ing{font-size:12px;color:#BDBDBD;padding:2px 0}

/* 내 메뉴 탭 */
.sheet-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
.sheet-status.ok{background:var(--green-light);color:var(--green)}
.sheet-status.loading{background:var(--gray-light);color:var(--gray)}
.sheet-status.err{background:var(--red-light);color:var(--red)}

/* 룰렛 */
.roulette-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0 4px}
.roulette-title{font-size:13px;font-weight:600;color:#616161;margin-bottom:14px;display:flex;align-items:center;gap:5px}
.canvas-outer{position:relative;width:280px;height:280px;margin:0 auto}
/* 바늘: 캔버스 위 정중앙 상단에 고정, 아래를 가리킴 */
.roulette-needle{
  position:absolute;
  top:-6px; left:50%;
  transform:translateX(-50%);
  width:0; height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:28px solid #E53935;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));
  z-index:10;
}
#rouletteCanvas{border-radius:50%;display:block;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.spin-btn{margin-top:16px;padding:12px 36px;background:var(--green);color:#fff;border:none;border-radius:24px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 2px 8px rgba(46,125,50,.35)}
.spin-btn:hover{background:#1B5E20;transform:translateY(-1px)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.roulette-result{margin-top:14px;text-align:center;min-height:40px}
.roulette-result-name{font-size:22px;font-weight:700;color:var(--green);animation:popIn .3s ease}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.roulette-result-sub{font-size:13px;color:#757575;margin-top:4px}

/* 카드 그리드 */
.menu-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:2px}
.menu-card{background:#fff;border:1px solid var(--gray-border);border-radius:14px;padding:14px;transition:box-shadow .15s;position:relative;overflow:hidden}
.menu-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.menu-card.찌개::before,.menu-card.국::before{background:#42A5F5}
.menu-card.볶음::before{background:#EF5350}
.menu-card.볶음밥::before{background:#FFB300}
.menu-card.구이::before{background:#FF7043}
.menu-card.양식::before{background:#AB47BC}
.menu-card.분식::before{background:#26A69A}
.menu-card.기타::before{background:#BDBDBD}
.menu-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.1)}
.mc-cat{font-size:10px;font-weight:700;color:#9E9E9E;letter-spacing:.5px;margin-bottom:5px}
.mc-name{font-size:15px;font-weight:700;color:#212121;margin-bottom:5px}
.mc-ing{font-size:11px;color:#9E9E9E;line-height:1.4;margin-bottom:4px}
.mc-memo{font-size:11px;color:#616161;line-height:1.4;font-style:italic}
.mc-meta{display:flex;gap:8px;margin-top:7px}
.mc-chip{font-size:10px;color:#9E9E9E;display:flex;align-items:center;gap:2px}
.mc-chip i{font-size:11px}
.open-sheet-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border:1.5px dashed var(--gray-border);border-radius:12px;color:#757575;font-size:13px;cursor:pointer;text-decoration:none;transition:all .15s;margin-top:12px;background:none;width:100%;font-family:inherit}
.open-sheet-btn:hover{border-color:var(--green-mid);color:var(--green)}

/* 공통 */
.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;padding:28px}
.dots{display:flex;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green-mid);animation:bop .7s infinite}
.dot:nth-child(2){animation-delay:.12s}.dot:nth-child(3){animation-delay:.24s}
@keyframes bop{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.1);opacity:1}}
.loading-text{font-size:13px;color:#9E9E9E}
.empty-state{text-align:center;padding:36px 20px;color:#BDBDBD}
.empty-state i{font-size:44px;margin-bottom:10px;display:block}
.err-box{padding:13px;background:#FFEBEE;border-radius:10px;font-size:13px;color:#C62828;margin-top:14px}
@media(max-width:480px){.alts-grid{grid-template-columns:1fr}.result-menu-name{font-size:22px}.menu-cards-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="site-title"><span style="font-size:20px">🍽️</span><h1>우리가족 오늘 메뉴 추천</h1></div>
    <div class="weather-pill" id="weatherPill"><i class="ti ti-sun"></i><span id="weatherText">날씨 확인 중</span></div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('recommend',this)"><i class="ti ti-wand"></i>메뉴 추천</button>
    <button class="tab-btn" onclick="switchTab('fridge',this)"><i class="ti ti-fridge"></i>냉장고 추천</button>
    <button class="tab-btn" onclick="switchTab('mymenus',this)"><i class="ti ti-list"></i>내 메뉴 목록</button>
  </div>
</nav>

<main class="content">

<!-- 탭1 -->
<div id="tab-recommend" class="tab-panel active">
  <div class="card">
    <p class="card-title"><i class="ti ti-mood-smile"></i>오늘 기분은?</p>
    <div class="mood-grid" id="moodGrid">
      <button class="mood-btn active" data-mood="뭐든 좋아">뭐든 좋아 😄</button>
      <button class="mood-btn" data-mood="든든하게">든든하게 💪</button>
      <button class="mood-btn" data-mood="가볍게">가볍게 🥗</button>
      <button class="mood-btn" data-mood="매운게 땡겨">매운 게 땡겨 🌶️</button>
      <button class="mood-btn" data-mood="따뜻한 국물">따뜻한 국물 🍲</button>
      <button class="mood-btn" data-mood="간단하게">간단하게 ⚡</button>
      <button class="mood-btn" data-mood="색다른거">색다른 거 🌟</button>
      <button class="mood-btn" data-mood="아이들이 좋아하는">아이들 최애 🧒</button>
    </div>
  </div>
  <button class="rec-btn green" id="recBtn1" onclick="getRecommendation('mood')">
    <i class="ti ti-sparkles"></i> 오늘 메뉴 추천받기
  </button>
  <div id="result1"></div>
</div>

<!-- 탭2 -->
<div id="tab-fridge" class="tab-panel">
  <div class="card">
    <p class="card-title"><i class="ti ti-fridge"></i>집에 있는 재료를 골라주세요</p>

    <div class="ing-category">
      <div class="ing-cat-label">🥩 단백질</div>
      <div class="ing-chips">
        <button class="ing-chip cat-단백질" data-ing="돼지고기 앞다리살">앞다리살</button>
        <button class="ing-chip cat-단백질" data-ing="삼겹살">삼겹살</button>
        <button class="ing-chip cat-단백질" data-ing="돼지고기 목살">목살</button>
        <button class="ing-chip cat-단백질" data-ing="돼지 국거리">돼지 국거리</button>
        <button class="ing-chip cat-단백질" data-ing="소고기 국거리">소 국거리</button>
        <button class="ing-chip cat-단백질" data-ing="소고기 불고기용">소 불고기용</button>
        <button class="ing-chip cat-단백질" data-ing="닭 볶음탕용">닭 볶음탕용</button>
        <button class="ing-chip cat-단백질" data-ing="닭가슴살">닭가슴살</button>
        <button class="ing-chip cat-단백질" data-ing="닭다리">닭다리</button>
        <button class="ing-chip cat-단백질" data-ing="계란" data-default="true">계란 🥚</button>
        <button class="ing-chip cat-단백질" data-ing="두부" data-default="true">두부</button>
        <button class="ing-chip cat-단백질" data-ing="참치캔">참치캔</button>
        <button class="ing-chip cat-단백질" data-ing="햄(스팸)">햄(스팸)</button>
        <button class="ing-chip cat-단백질" data-ing="소시지">소시지</button>
        <button class="ing-chip cat-단백질" data-ing="새우">새우</button>
        <button class="ing-chip cat-단백질" data-ing="오징어">오징어</button>
        <button class="ing-chip cat-단백질" data-ing="조개">조개</button>
        <button class="ing-chip cat-단백질" data-ing="멸치">멸치</button>
      </div>
    </div>

    <div class="ing-category">
      <div class="ing-cat-label">🥬 채소</div>
      <div class="ing-chips">
        <button class="ing-chip cat-채소" data-ing="대파" data-default="true">대파 🌿</button>
        <button class="ing-chip cat-채소" data-ing="양파" data-default="true">양파</button>
        <button class="ing-chip cat-채소" data-ing="마늘" data-default="true">마늘</button>
        <button class="ing-chip cat-채소" data-ing="배추김치" data-default="true">배추김치</button>
        <button class="ing-chip cat-채소" data-ing="감자">감자</button>
        <button class="ing-chip cat-채소" data-ing="고구마">고구마</button>
        <button class="ing-chip cat-채소" data-ing="애호박">애호박</button>
        <button class="ing-chip cat-채소" data-ing="당근">당근</button>
        <button class="ing-chip cat-채소" data-ing="브로콜리">브로콜리</button>
        <button class="ing-chip cat-채소" data-ing="콩나물">콩나물</button>
        <button class="ing-chip cat-채소" data-ing="숙주">숙주</button>
        <button class="ing-chip cat-채소" data-ing="시금치">시금치</button>
        <button class="ing-chip cat-채소" data-ing="깻잎">깻잎</button>
        <button class="ing-chip cat-채소" data-ing="부추">부추</button>
        <button class="ing-chip cat-채소" data-ing="버섯">버섯</button>
        <button class="ing-chip cat-채소" data-ing="양배추">양배추</button>
        <button class="ing-chip cat-채소" data-ing="청경채">청경채</button>
        <button class="ing-chip cat-채소" data-ing="쪽파">쪽파</button>
        <button class="ing-chip cat-채소" data-ing="대추">대추</button>
        <button class="ing-chip cat-채소" data-ing="미역">미역</button>
        <button class="ing-chip cat-채소" data-ing="고추">고추</button>
        <button class="ing-chip cat-채소" data-ing="피망">피망</button>
        <button class="ing-chip cat-채소" data-ing="토마토">토마토</button>
      </div>
    </div>

    <div class="ing-category">
      <div class="ing-cat-label">🧀 유제품/기타 냉장</div>
      <div class="ing-chips">
        <button class="ing-chip cat-유제품" data-ing="우유">우유</button>
        <button class="ing-chip cat-유제품" data-ing="버터">버터</button>
        <button class="ing-chip cat-유제품" data-ing="생크림">생크림</button>

// ── 시트
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals=[]; let cur=''; let inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){vals.push(cur.trim());cur='';}
      else{cur+=line[i];}
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'');});
    return obj;
  }).filter(r=>r[headers[0]]&&r[headers[0]].trim());
}
async function loadSheet() {

// ── 룰렛 (바늘 고정, 바퀴 회전)
const COLORS=['#4CAF50','#FF7043','#42A5F5','#FFB300','#AB47BC','#26A69A','#EF5350','#78909C','#66BB6A','#FFA726','#29B6F6','#EC407A','#8D6E63','#5C6BC0','#26C6DA'];

function drawWheel(highlightIdx=-1){
  const canvas=document.getElementById('rouletteCanvas');
  const ctx=canvas.getContext('2d');
  const cx=140,cy=140,r=132;
  const names=menuData.slice(0,15).map(m=>m['메뉴명']||m[Object.keys(m)[0]]||'');
  const n=names.length;
  if(!n) return;
  const slice=(Math.PI*2)/n;
  ctx.clearRect(0,0,280,280);

  for(let i=0;i<n;i++){
    // 바퀴 자체가 wheelAngle만큼 회전
    const start=wheelAngle+i*slice-Math.PI/2;
    const end=start+slice;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle=(highlightIdx===i)?'#FFF176':COLORS[i%COLORS.length];
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();

    // 텍스트
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(start+slice/2);
    ctx.textAlign='right';
    ctx.fillStyle='#fff';
    ctx.font='bold 12px Noto Sans KR,sans-serif';
    ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=3;
    ctx.fillText((names[i].length>6?names[i].slice(0,5)+'…':names[i]),r-10,4);
    ctx.restore();
  }
  // 중앙 원
  ctx.beginPath();ctx.arc(cx,cy,18,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#E0E0E0';ctx.lineWidth=2;ctx.stroke();
}

function spinRoulette(){
  if(isSpinning||!menuData.length) return;
  isSpinning=true;
  const btn=document.getElementById('spinBtn');
  btn.disabled=true;
  document.getElementById('rouletteResult').innerHTML='';

  const n=Math.min(menuData.length,15);
  const slice=(Math.PI*2)/n;
  // 바퀴를 5~8바퀴 더 돌린 뒤 멈출 목표 각도
  const extraRot=(Math.random()*3+5)*Math.PI*2;
  const startAngle=wheelAngle;
  const targetAngle=startAngle+extraRot;
  const duration=3800;
  const t0=performance.now();
  function ease(t){return 1-Math.pow(1-t,3);}

  function frame(now){
    const p=Math.min((now-t0)/duration,1);
    wheelAngle=startAngle+(targetAngle-startAngle)*ease(p);
    drawWheel();
    if(p<1){requestAnimationFrame(frame);return;}

    // 바늘은 위(12시 = -PI/2)를 가리킴.
    // 슬라이스 i의 중앙 각도(절대) = wheelAngle + i*slice - PI/2 + slice/2
    // 바늘(0 = -PI/2 방향)에 가장 가까운 슬라이스 찾기
    // 각 슬라이스 중앙의 "화면 각도(0=위)"를 계산
    let winIdx=0, minDiff=Infinity;
    for(let i=0;i<n;i++){
      const midAbs=wheelAngle+i*slice-Math.PI/2+slice/2; // 절대 각도
      // 위쪽(0)과의 차이 (0~PI 범위로 normalize)
      let diff=((midAbs%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
      if(diff>Math.PI) diff=Math.PI*2-diff;
      if(diff<minDiff){minDiff=diff;winIdx=i;}
    }
    drawWheel(winIdx);
    const menu=menuData[winIdx];
    const name=menu['메뉴명']||menu[Object.keys(menu)[0]]||'';
    document.getElementById('rouletteResult').innerHTML=
      `<div class="roulette-result-name">🎉 ${name}!</div>
       <div class="roulette-result-sub">${menu['주재료']?'주재료: '+menu['주재료']:''}</div>`;
    isSpinning=false;btn.disabled=false;
  }
  requestAnimationFrame(frame);
}

JSON만 출력:
${jsonSpec}`;

  const fridgeSpec=`{"main":{"name":"메뉴명","reason":"이 재료로 이 메뉴가 좋은 이유 2~3문장","recipe_tip":"재료 활용 팁","youtube_queries":["백종원 또는 류수영 검색어1","검색어2"],"missing_ingredients":["추가하면 더 좋은 재료"]},"alternatives":[{"name":"대안1","reason":"이유"},{"name":"대안2","reason":"이유"}],"trending_bonus":{"name":"이 재료로 만드는 의외의 어린이 인기 메뉴","reason":"왜 아이들이 좋아하는지","youtube_query":"검색어"}}`;
  const fridgePrompt=`당신은 냉장고 파먹기 요리 추천 AI입니다.
${kidNote}
[집에 있는 재료] ${ingredients.join(', ')} [날씨] ${weatherInfo} [요일] ${day}
[내 메뉴 목록]\n${menuText}
집에 있는 재료로 만들 수 있으면서 어린이도 잘 먹는 메뉴를 추천해주세요.
JSON만 출력:
${fridgeSpec}`;

  try{
    const resp=await fetch(CLAUDE_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:mode==='mood'?moodPrompt:fridgePrompt}]})
    });
    if(!resp.ok) throw new Error('API '+resp.status);
    const data=await resp.json();
    const raw=data.content.map(c=>c.text||'').join('');
    const m=raw.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
    if(!m) throw new Error('no json');
    renderResult(resultId,JSON.parse(m[0]),mode);
  } catch(e){
    resultDiv.innerHTML=`<div class="err-box"><i class="ti ti-alert-circle"></i> 추천을 불러오지 못했어요 (${e.message}). 잠시 후 다시 시도해주세요.</div>`;
  }
  btn.disabled=false;
}

function ytUrl(q){return `https://www.youtube.com/results?search_query=${encodeURIComponent(q+' 레시피 쇼츠')}`;}

function renderResult(id,rec,mode){
  const m=rec.main,alts=rec.alternatives||[],trend=rec.trending_bonus;
  const missing=(mode==='fridge'&&m.missing_ingredients&&m.missing_ingredients.length)
    ?`<p class="missing-ing"><i class="ti ti-shopping-cart" style="font-size:12px;vertical-align:-1px"></i> 있으면 더 좋은 재료: ${m.missing_ingredients.join(', ')}</p>`:'';
  const ytHtml=(m.youtube_queries||[]).map(q=>`
    <a class="yt-link-btn" href="${ytUrl(q)}" target="_blank">
      <div class="yt-icon"><i class="ti ti-brand-youtube"></i></div>
      <div class="yt-text"><div class="yt-title-text">${q} 레시피</div><div class="yt-sub">유튜브 쇼츠 검색</div></div>
      <i class="ti ti-external-link" style="color:#9E9E9E;font-size:14px"></i>
    </a>`).join('');
  const altHtml=alts.map(a=>`<div class="alt-card"><div class="alt-name">${a.name}</div><div class="alt-reason">${a.reason}</div></div>`).join('');
  const trendHtml=trend?`
    <p style="font-size:12px;color:#9E9E9E;margin:14px 0 8px;padding-left:4px">의외의 추천</p>
    <div class="trend-card">
      <div class="trend-badge"><i class="ti ti-trending-up"></i> 보너스</div>
      <div class="trend-name">${trend.name}</div>
      <div class="trend-reason">${trend.reason}</div>
      <a class="yt-link-btn" href="${ytUrl(trend.youtube_query)}" target="_blank" style="background:#fff">
        <div class="yt-icon"><i class="ti ti-brand-youtube"></i></div>
        <div class="yt-text"><div class="yt-title-text">${trend.youtube_query} 레시피</div><div class="yt-sub">유튜브 쇼츠 검색</div></div>
        <i class="ti ti-external-link" style="color:#9E9E9E;font-size:14px"></i>
      </a>
    </div>`:'';
  document.getElementById(id).innerHTML=`<div class="result-wrapper">
    <div class="main-result">
      <div class="result-badge"><i class="ti ti-sparkles"></i> 오늘의 추천</div>
      <div class="result-menu-name">${m.name}</div>
      <div class="result-reason">${m.reason}</div>
      ${m.recipe_tip?`<div class="recipe-tip"><strong>📝 레시피 팁</strong>${m.recipe_tip}</div>`:''}
      ${missing}
      ${ytHtml?`<div class="yt-section"><div class="yt-label"><i class="ti ti-brand-youtube"></i> 레시피 영상</div>${ytHtml}</div>`:''}
    </div>
    ${alts.length?`<p style="font-size:12px;color:#9E9E9E;margin-bottom:8px;padding-left:4px">다른 선택지</p><div class="alts-grid">${altHtml}</div>`:''}
    ${trendHtml}
  </div>`;
}

loadWeather();
loadSheet();
</script>
</body>
</html>
